name: Continuous Integration

on:
 push:
  branches:
   - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      -name: Verify Html File Exists
       run: test -f index.html

      -name: Verify CSS File Exists
       run: test -f style.css

      -name: Verify JavaScript File Exists
       run: test -f script.JavaScript

      -name: CI successful
       run: echo "Website Passed Validation" 
 
 


